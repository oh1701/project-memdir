name: tests

on:
  push:
  pull_request:

jobs:
  unittest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile Python files
        run: |
          python -m py_compile \
            hooks/automation/memdir_cli.py \
            hooks/automation/harness_lib/*.py \
            scripts/notify/*.py \
            examples/local_extractor.py
      - name: Run unit tests
        run: |
          python -m unittest \
            tests.test_memdir_hooks \
            tests.test_memdir_extractor_provider \
            tests.test_memdir_embedding_provider \
            tests.test_memdir_notify_queue
